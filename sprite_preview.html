<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>sprite preview</title>
<style>
  body { background: #171c16; font-family: -apple-system, sans-serif; color: #d8e0d8; margin: 16px; }
  .grid { display: flex; gap: 18px; flex-wrap: wrap; }
  .cell { text-align: center; }
  canvas { image-rendering: auto; display: block; margin: 0 auto; }
  .lbl { font-size: 12px; margin-top: 4px; color: #9aa89e; }
</style></head><body>
<div class="grid" id="grid"></div>
<script>
// exact copy of the game's team tint: multiply + destination-in
const COLORS = { 1: '#3fb9c9', 2: '#e0564a', 3: '#8fc94a' };
function tint(img, team) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const g = c.getContext('2d');
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = 'multiply';
  g.fillStyle = COLORS[team];
  g.fillRect(0, 0, c.width, c.height);
  g.globalCompositeOperation = 'destination-in';
  g.drawImage(img, 0, 0);
  return c;
}
const files = ['unit_marine', 'unit_raider', 'unit_tank', 'unit_harvester', 'unit_artillery'];
for (const f of files) {
  const img = new Image();
  img.onload = () => {
    for (const team of [1, 2]) {
      const cv = document.createElement('canvas');
      cv.width = 120; cv.height = 120;
      cv.getContext('2d').drawImage(tint(img, team), 0, 0, 120, 120);
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.appendChild(cv);
      cell.insertAdjacentHTML('beforeend', `<div class="lbl">${f.slice(5)} · ${team === 1 ? 'teal' : 'red'}</div>`);
      document.getElementById('grid').appendChild(cell);
    }
  };
  img.src = 'assets/sprites/' + f + '.png';
}
</script></body></html>
